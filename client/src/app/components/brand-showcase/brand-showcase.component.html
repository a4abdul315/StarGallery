<section class="brand-showcase-section pb-8 md:pb-32 lg:pb-[12rem] bg-white px-0 lg:px-[12rem]">
  <div class="sg-container !px-0 md:!px-10">
    <div class="brand-showcase-wrapper md:rounded-[2.5rem] overflow-hidden bg-white">
      
      <!-- PARENT BANNER SLIDER (TOP) -->
      <div class="banner-slider-container relative">
        <p-carousel 
          [value]="banners" 
          [numVisible]="1" 
          [numScroll]="1" 
          [circular]="true" 
          (onPage)="onBannerChange($event)"
          styleClass="banner-carousel"
        >
          <ng-template let-banner pTemplate="item">
            <div class="banner-item h-auto min-h-[150px] md:h-[150px] relative flex items-center overflow-hidden" [style.background]="banner.bannerBg">
              <!-- Mobile Image -->
              <img *ngIf="banner.mobileImageUrl" [src]="banner.mobileImageUrl" alt="Mobile Banner" class="w-full h-auto block md:hidden">
              <!-- Desktop Content -->
              <div class="hidden md:block w-full h-full"></div>
            </div>
          </ng-template>
        </p-carousel>
      </div>

      <!-- CHILD PRODUCT SLIDER (BOTTOM) -->
      <div class="product-slider-container bg-[#B23438] px-0 md:px-6 pt-8 pb-8">
        
        <!-- Desktop: PrimeNG Carousel -->
        <div class="hidden md:block">
          <p-carousel 
            #productCarousel
            [value]="filteredProducts" 
            [numVisible]="6" 
            [numScroll]="2" 
            [circular]="false"
            [responsiveOptions]="productResponsive"
            styleClass="product-carousel"
          >
            <ng-template let-product pTemplate="item">
              <div class="product-card-wrap px-3">
                <ng-container *ngTemplateOutlet="productTemplate; context: {$implicit: product}"></ng-container>
              </div>
            </ng-template>
          </p-carousel>
        </div>

        <!-- Mobile: Native Snap Scroll -->
        <div class="md:hidden flex overflow-x-auto snap-x snap-mandatory scrollbar-hide px-4 gap-3 mobile-products-list">
          <div *ngFor="let product of filteredProducts" class="flex-shrink-0 w-[85%] snap-center">
             <ng-container *ngTemplateOutlet="productTemplate; context: {$implicit: product}"></ng-container>
          </div>
        </div>

        <!-- Shared Product Template -->
        <ng-template #productTemplate let-product>
          <div class="product-card bg-white rounded-2xl p-3 relative group w-full h-[390px] lg:h-auto mx-auto overflow-hidden">
            <!-- Interactive Stack -->
            <div class="absolute top-3 right-3 z-30 flex flex-col gap-2">
              <button (click)="toggleWishlist(product.id)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm text-gray-400">
                <i class="pi" [class.pi-heart]="!product.isWishlisted" [class.pi-heart-fill]="product.isWishlisted" [class.text-red-500]="product.isWishlisted"></i>
              </button>
              <div class="w-8 h-8 flex items-center justify-center rounded-xl bg-white shadow-sm overflow-hidden">
                <div class="relative w-6 h-6">
                  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full bg-[#FF3B30]"></div>
                  <div class="absolute bottom-0 left-0 w-3 h-3 rounded-full bg-[#FFCC00]"></div>
                  <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full bg-[#007AFF]"></div>
                </div>
              </div>
            </div>

            <!-- Image Area -->
            <div class="relative w-full aspect-square overflow-hidden bg-[#F9FAFB] mb-2 rounded-xl">
              <div #variationContainer class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide w-full h-full variation-swipe-container">
                <div *ngFor="let img of product.images" class="flex-shrink-0 w-full h-full snap-center flex items-center justify-center p-4">
                  <img [src]="img" [alt]="product.name" class="max-h-full max-w-full object-contain pointer-events-none">
                </div>
              </div>
            </div>

            <!-- Info -->
            <div class="product-info space-y-1 text-left px-1">
              <h3 class="text-[14px] font-bold text-black leading-tight mb-2 line-clamp-2 min-h-[34px]">
                {{ lang === 'ar' ? product.nameAr : product.name }}
              </h3>
              <div class="flex items-center gap-1.5 mb-1.5">
                <div class="flex items-center text-[#FFC107] text-[12px] gap-0.5">
                  <i class="pi pi-star-fill"></i><i class="pi pi-star-fill"></i><i class="pi pi-star-fill"></i><i class="pi pi-star-fill"></i><i class="pi pi-star text-[#D1D5DB]"></i>
                </div>
                <span class="text-[14px] text-gray-400">{{ product.rating }} ({{ product.reviews }})</span>
              </div>
              <div class="flex items-center justify-between mb-3">
                <span class="text-[16px] font-black text-black flex items-center">
                  <img src="assets/Group.png" alt="AED" class="h-[14px] mr-1">
                  {{ product.price }}.00
                </span>
                <span class="text-[10px] font-bold px-1.5 py-0.5 bg-[#FFF0F0] rounded-full text-[#B23438]">
                  40% {{ tr.t('off') }}
                </span>
              </div>
              <div *ngIf="product.cashOnDelivery" class="flex items-center gap-1.5 text-[#00A651] text-[14px] font-bold">
                <img src="assets/cashicon.png" alt="COD" class="h-4 w-4">
                {{ tr.t('cashOnDeliveryBadge') }}
              </div>
              <div class="flex items-center gap-2">
                <img *ngIf="product.tabby" src="assets/tabby_v2 1.png" alt="Tabby" class="h-10 object-contain">
                <img *ngIf="product.tamara" src="assets/tamara-en 1.png" alt="Tamara" class="h-10 object-contain">
              </div>
            </div>
          </div>
        </ng-template>

        <!-- VIEW MORE BUTTON -->
        <div class="mt-8 flex justify-center px-4">
          <button class="bg-white text-[#B23438] font-black py-4 px-12 rounded-2xl w-full text-xl">
            {{ tr.t('viewMore') }}
          </button>
        </div>
      </div>

    </div>
  </div>
</section>
