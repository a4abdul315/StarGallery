<section class="category-section">
  <div class="sg-container relative">
    <!-- Desktop Carousel -->
    <div class="hidden lg:block">
      <p-carousel
        [value]="categories"
        [numVisible]="10"
        [numScroll]="3"
        [circular]="true"
        [responsiveOptions]="desktopResponsive"
        styleClass="category-carousel"
      >
        <ng-template let-cat pTemplate="item">
          <div class="cat-item" [id]="'cat-' + cat.id">
            <div class="cat-circle">
              <img src="assets/charger.png" [alt]="getCategoryName(cat)" class="cat-img" loading="lazy">
            </div>
            <span class="cat-name">{{ getCategoryName(cat) }}</span>
          </div>
        </ng-template>
      </p-carousel>
    </div>

    <!-- Mobile 2-Row Grid -->
    <div class="lg:hidden">
      <div class="mobile-cat-grid">
        <div *ngFor="let cat of categories.slice(0, 10)" class="cat-item">
          <div class="cat-circle">
            <img src="assets/charger.png" [alt]="getCategoryName(cat)" class="cat-img" loading="lazy">
          </div>
          <span class="cat-name">{{ getCategoryName(cat) }}</span>
        </div>
      </div>
      <!-- Mobile Progress Indicator -->
      <div class="mobile-cat-indicator">
        <div class="indicator-track">
          <div class="indicator-bar"></div>
        </div>
      </div>
    </div>
  </div>
</section>
